name: Testing CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Testing/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  docker-publish:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          $repo = "${{ github.repository }}".ToLower()
          "image=ghcr.io/$repo/testing-backend" >> $env:GITHUB_OUTPUT
          "sha_tag=${{ github.sha }}" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Exp20/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}

  deploy-container:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: docker pull ${{ needs.docker-publish.outputs.image }}:${{ needs.docker-publish.outputs.sha_tag }}

      - name: Start backend container
        run: docker run -d --name testing-backend -p 5000:5000 ${{ needs.docker-publish.outputs.image }}:${{ needs.docker-publish.outputs.sha_tag }}

      - name: Verify deployed container
        run: |
          sleep 10
          curl --fail http://127.0.0.1:5000/

      - name: Show container logs on failure
        if: failure()
        run: docker logs testing-backend

      - name: Stop container
        if: always()
        run: docker rm -f testing-backend || true
