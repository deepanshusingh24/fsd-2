services:
  - type: web
    name: customer-service
    runtime: python
    rootDir: /Backend/Experiment_11/micro-services-lab/customer-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT customer_app:app
    envVars:
      - key: ORDER_SERVICE_URL
        value: https://order-service.onrender.com
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 8080

  - type: web
    name: order-service
    runtime: python
    rootDir: /Backend/Experiment_11/micro-services-lab/order-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT order_app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 8080
